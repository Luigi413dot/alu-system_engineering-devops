<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Ceci n'est pas une page</title>
    <meta name="description" content="Oops! This page doesn't exist. Ceci n'est pas une page. Error 404.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1a202c;
            --secondary: #4a5568;
            --accent: #ed8936;
            --bg: #f7fafc;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 800px;
            width: 90%;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            animation: fadeIn 1s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, #2d3748, #4a5568);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-style: italic;
        }

        p {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            border: 2px solid var(--primary);
        }

        .btn:hover {
            background-color: transparent;
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Decorative elements */
        .shape {
            position: absolute;
            z-index: 1;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
        }

        .shape-1 {
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: #cbd5e0;
        }

        .shape-2 {
            bottom: -10%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: #a0aec0;
        }

        @media (max-width: 640px) {
            .error-code {
                font-size: 5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Ceci n'est pas une page</h1>
        <p>The page you are looking for has vanished into the surreal. It might have never existed, or it might just be
            pretending not to be here.</p>
        <a href="/" class="btn" id="back-home">Return to Reality</a>
    </div>

    <script>
        // Subtle mouse parallax effect
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.container');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
</body>

</html>
